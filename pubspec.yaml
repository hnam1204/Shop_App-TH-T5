version: 1.0.0

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  carousel_slider: ^5.1.2
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  intl: ^0.20.2
  shared_preferences: ^2.5.3
